name: Contact Form Healthcheck

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/contact-healthcheck.yml"
      - "scripts/contact-healthcheck.sh"

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check contact form dependencies
        run: ./scripts/contact-healthcheck.sh
